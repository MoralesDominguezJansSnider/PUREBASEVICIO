<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mensajes</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" th:href="@{/css/WAS.css}">
</head>
<body>
<div th:replace="~{fragments :: header}"></div>
<div th:replace="~{fragments :: navbar}"></div>
<div class="chat-container">
    <!-- PANEL DE CONTACTOS -->
    <div class="contactos-panel">
        <div class="chat-header">
            <h2>Mensajes</h2>
        </div>
        <!-- Lista de contactos -->
        <div class="contacto"
             th:each="v : ${contactos}">
            <!-- Si es PADRE -->
            <a th:if="${usuarioActual.rol.name() == 'PADRE'}"
               th:href="@{/mensajes/chat/{id}(id=${v.usuarioVinculado.id})}"
               class="contacto-link">
                <div class="avatar">
                    <span th:text="${v.usuarioVinculado.nombre.substring(0,1)}">
                    </span>
                </div>
                <div class="contacto-info">
                    <strong th:text="${v.usuarioVinculado.nombre}">
                    </strong>
                    <small th:text="${v.usuarioVinculado.rol}">
                    </small>
                </div>
            </a>
            <!-- Si es PROFESIONAL -->
            <a th:if="${usuarioActual.rol.name() != 'PADRE'}"
               th:href="@{/mensajes/chat/{id}(id=${v.padre.id})}"
               class="contacto-link">
                <div class="avatar">
                    <span th:text="${v.padre.nombre.substring(0,1)}">
                    </span>
                </div>
                <div class="contacto-info">
                    <strong th:text="${v.padre.nombre}">
                    </strong>
                    <small>
                        Padre
                    </small>
                </div>
            </a>
        </div>
        <!-- Sin contactos -->
        <div th:if="${#lists.isEmpty(contactos)}"
             class="sin-contactos">
            No tienes contactos vinculados.
        </div>
    </div>
    <!-- PANEL DERECHO -->
    <div class="chat-vacio">
        <h2>
            Selecciona una conversación
        </h2>
        <p>
            Elige un contacto para comenzar a enviar mensajes.
        </p>
    </div>
</div>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
